name: Weekly Actress Pages
on:
  schedule:
    - cron: '0 2 * * 1'  # 毎週月曜 JST 11:00
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests python-dotenv Jinja2
      - name: Generate actress pages
        env:
          API_ID: ${{ secrets.API_ID }}
          AFFILIATE_ID: ${{ secrets.AFFILIATE_ID }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
        working-directory: scripts
        run: python generate_actress.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git diff --staged --quiet || (git commit -m "auto: 女優ページ更新 $(date +%Y-%m-%d)" && git push)
