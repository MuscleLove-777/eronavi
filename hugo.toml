baseURL = "https://musclelove-777.github.io/eronavi/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "エロナビ | AV・アニメ・同人・グッズ・写真集・小説 総合アダルトレビュー"
theme = "PaperMod"
paginate = 30

enableRobotsTXT = true

[services]
  [services.googleAnalytics]
    ID = "G-YRT6J0RWKT"

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
buildDrafts = false
buildFuture = false
buildExpired = false

[sitemap]
  changefreq = "daily"
  priority = 0.7
  filename = "sitemap.xml"

[params]
  env = "production"
  canonicalURL = true
  description = "実写AV・エロアニメ・同人・ASMR・アダルトグッズ…全ジャンル網羅のアダルト総合レビューサイト。サンプル付きで毎日更新"
  author = "エロナビ編集部"
  images = ["og-default.png"]
  # NOTE: サイト全体のデフォルトキーワード。各記事のフロントマターで個別に3-5個に絞ることを推奨
  keywords = ["AV おすすめ", "アダルト動画 ランキング", "FANZA おすすめ", "エロ動画 レビュー", "AV 新作", "NTR AV", "熟女 AV", "VR AV", "巨乳 AV", "素人 AV", "痴女 AV", "中出し AV", "ギャル AV", "レズ AV", "痴漢 AV", "オナホ おすすめ", "TENGA ランキング", "アダルトグッズ レビュー", "同人 FANZA", "SM AV", "OL AV", "女子校生 AV", "母乳 AV", "マッサージ AV", "乱交 AV", "寝取らせ AV", "新人 AV デビュー", "受賞作 AV", "3P AV", "エロアニメ おすすめ", "同人CG FANZA", "ASMR おすすめ", "同人ゲーム エロ", "エロゲ おすすめ", "アダルトコミック", "NTR アニメ", "触手 同人", "異世界 エロ", "学園アニメ エロ", "BL 同人", "バイブ おすすめ", "ローション おすすめ", "写真集 グラビア", "官能小説", "TL おすすめ", "アダルトDVD", "フィギュア エロ"]
  defaultTheme = "dark"
  ShowReadingTime = false
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPageNums = true
  ShowToc = false
  TocOpen = false
  comments = false
  disableSpecial1stPost = true

  # Google Analytics
  googleAnalyticsID = "G-YRT6J0RWKT"

  [params.analytics.google]
    SiteVerificationTag = ""

  [params.homeInfoParams]
    Title = "エロナビ"
    Content = "AV・エロアニメ・同人・アダルトグッズ・写真集・官能小説…全57ジャンルを毎日レビュー。サンプル付きで気になる作品をチェック！ Presented by MuscleLove"

  [[params.socialIcons]]
    name = "x-twitter"
    url = "https://x.com/MuscleGirlLove7"

  [[params.socialIcons]]
    name = "linktree"
    url = "https://linktr.ee/ILoveMyCats"

[params.assets]
  favicon = "favicon.svg"
  favicon16x16 = "favicon.svg"
  favicon32x32 = "favicon.svg"
  apple_touch_icon = "favicon.svg"
  safari_pinned_tab = "favicon.svg"

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false
  linkFullImages = true

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON", "sitemap_posts", "sitemap_hubs", "sitemap_categories", "sitemap_pages"]

# ----- Sitemap split (Wave10-C) -----
# 単一sitemap.xml(702URL)をカテゴリ別に分割しクロール予算を最適化。
# master sitemap.xml は sitemapindex として4つの子sitemapを参照する。
[outputFormats.sitemap_posts]
  mediaType = "application/xml"
  baseName = "sitemap_posts"
  isPlainText = true
  isHTML = false
  noUgly = true
  rel = "sitemap"

[outputFormats.sitemap_hubs]
  mediaType = "application/xml"
  baseName = "sitemap_hubs"
  isPlainText = true
  isHTML = false
  noUgly = true
  rel = "sitemap"

[outputFormats.sitemap_categories]
  mediaType = "application/xml"
  baseName = "sitemap_categories"
  isPlainText = true
  isHTML = false
  noUgly = true
  rel = "sitemap"

[outputFormats.sitemap_pages]
  mediaType = "application/xml"
  baseName = "sitemap_pages"
  isPlainText = true
  isHTML = false
  noUgly = true
  rel = "sitemap"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

# 関連記事(.Site.RegularPages.Related)用インデックス設定
# tags/categories が一致するほど近いと判定。date も考慮してフレッシュな記事を優先。
[related]
  includeNewer = true
  threshold = 50
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "categories"
    weight = 60
  [[related.indices]]
    name = "date"
    weight = 10

