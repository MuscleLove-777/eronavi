{{ define "main" }}
<div style="text-align: center; padding: 60px 20px; max-width: 800px; margin: auto;">
  <h1 style="font-size: 80px; margin: 0; color: #ff6b6b;">404</h1>
  <h2 style="margin: 10px 0 30px; color: #f0f0f0;">ページが見つかりません</h2>
  <p style="color: #8b949e; margin-bottom: 30px;">お探しのページは移動または削除された可能性があります。</p>

  <div style="margin: 30px 0;">
    <a href="{{ .Site.BaseURL }}" style="display: inline-block; padding: 12px 30px; background: #e63946; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 8px;">トップページへ</a>
    <a href="{{ .Site.BaseURL }}categories/" style="display: inline-block; padding: 12px 30px; background: #30363d; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 8px;">カテゴリ一覧</a>
    <a href="{{ .Site.BaseURL }}search/" style="display: inline-block; padding: 12px 30px; background: #30363d; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 8px;">検索</a>
  </div>

  <h3 style="color: #f0f0f0; margin-top: 40px;">人気カテゴリ</h3>
  <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 16px;">
    {{ range (slice "ntr" "jukujo" "vr" "oppai" "shiroto" "anime" "onahole") }}
    <a href="{{ $.Site.BaseURL }}categories/{{ . }}/" style="padding: 8px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #ff6b6b; text-decoration: none;">{{ . }}</a>
    {{ end }}
  </div>
</div>
{{ end }}
