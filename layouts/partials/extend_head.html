<link rel="manifest" href="/eronavi/manifest.json" />
<meta name="theme-color" content="#e63946" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "author": {
    "@type": "Organization",
    "name": "エロナビ編集部"
  },
  "publisher": {
    "@type": "Organization",
    "name": "エロナビ"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }
  {{ with .Params.cover }}{{ if .image }},
  "image": "{{ .image }}"
  {{ end }}{{ end }}
  {{ with .Params.rating }},
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "{{ .average }}",
    "reviewCount": "{{ .count }}"
  }
  {{ end }}
}
</script>
{{ end }}

{{ if .IsPage }}
{{ with .Params.cover }}{{ if .image }}
<meta property="og:image" content="{{ .image }}" />
<meta name="thumbnail" content="{{ .image }}" />
{{ end }}{{ end }}
<meta property="og:type" content="article" />
<meta property="og:title" content="{{ .Title }}" />
<meta property="og:description" content="{{ .Description }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ .Title }}" />
<meta name="twitter:description" content="{{ .Description }}" />
{{ with .Params.cover }}{{ if .image }}
<meta name="twitter:image" content="{{ .image }}" />
{{ end }}{{ end }}
{{ end }}

<!-- BreadcrumbList -->
{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "ホーム", "item": "{{ .Site.BaseURL }}"},
    {{ range $i, $e := .Ancestors.Reverse }}
    {"@type": "ListItem", "position": {{ add $i 2 }}, "name": "{{ .Title }}", "item": "{{ .Permalink }}"},
    {{ end }}
    {"@type": "ListItem", "position": {{ add (len .Ancestors) 2 }}, "name": "{{ .Title }}"}
  ]
}
</script>
{{ end }}

<!-- WebSite + SearchAction (トップページのみ) -->
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ .Site.BaseURL }}search/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{{ end }}
